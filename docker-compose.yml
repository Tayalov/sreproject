services:

  auth-service:
    build: ./backend/auth-service
    image: auth-service:latest
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - PORT=5001
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  user-service:
    build: ./backend/user-service
    image: user-service:latest
    ports:
      - "5002:5002"
    env_file:
      - .env
    environment:
      - PORT=5002
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5002/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  product-service:
    build: ./backend/product-service
    image: product-service:latest
    ports:
      - "5003:5003"
    env_file:
      - .env
    environment:
      - PORT=5003
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5003/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  order-service:
    build: ./backend/order-service
    image: order-service:latest
    ports:
      - "5004:5004"
    env_file:
      - .env
    environment:
      - PORT=5004
    depends_on:
      - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5004/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  payment-service:
    build: ./backend/payment-service
    image: payment-service:latest
    ports:
      - "5005:5005"
    env_file:
      - .env
    environment:
      - PORT=5005
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5005/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  notification-service:
    build: ./backend/notification-service
    image: notification-service:latest
    ports:
      - "5006:5006"
    env_file:
      - .env
    environment:
      - PORT=5006
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5006/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    image: frontend:latest
    ports:
      - "3000:80"
    restart: unless-stopped

  postgres:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    ports:
      - "3001:3000"

  node-exporter:
    image: prom/node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"

volumes:
  pgdata: