groups:
- name: system_alerts
  rules:

  - alert: HighCPUUsageWarning
    expr: rate(process_cpu_seconds_total[1m]) > 0.5
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: High CPU usage detected

  - alert: HighMemoryUsageCritical
    expr: process_resident_memory_bytes > 200000000
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: High memory usage detected