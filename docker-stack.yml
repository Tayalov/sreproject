version: "3.8"

services:

  backend:
    image: finalweb-backend
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017/medline
    depends_on:
      - mongo
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  frontend:
    image: finalweb-frontend
    build: ./frontend
    ports:
      - "3000:80"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  mongo:
    image: mongo
    ports:
      - "27017:27017"
    deploy:
      replicas: 1

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    deploy:
      replicas: 1

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    deploy:
      replicas: 1